services:
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.1000.school
    environment:
      NEXT_PUBLIC_API_URL: https://api.1000.school
      NODE_ENV: production
    ports:
      - "3000:3000"
    expose:
      - "3000"
    depends_on:
      - server
    networks:
      - app_net

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - apps/server/.env
    environment:
      ENVIRONMENT: production
      ALLOWED_HOSTS: '["api.1000.school","app.1000.school","localhost","127.0.0.1"]'
      CORS_ORIGINS: '["https://app.1000.school","http://localhost:3000"]'
      AUTH_SUCCESS_URL: https://app.1000.school
    ports:
      - "8000:8000"
    expose:
      - "8000"
    networks:
      - app_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    depends_on:
      - client
      - server
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDENTIALS_FILE:-./cloudflared/credentials.json}:/etc/cloudflared/credentials.json:ro
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
