name: CI

on:
  pull_request:
  push:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  server-test:
    name: server-test
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      TEST_DATABASE_URL: sqlite+aiosqlite:///./test_ci.db
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install server dependencies
        run: python -m pip install -r requirements.txt

      - name: Ensure pytest installed
        run: python -m pip install pytest

      - name: Run pytest
        run: pytest

  e2e-high:
    name: e2e-high
    runs-on: ubuntu-latest
    needs: [build, server-test]
    env:
      ENVIRONMENT: test
      TEST_AUTH_BYPASS_ENABLED: 'true'
      TEST_DATABASE_URL: sqlite+aiosqlite:///./test_e2e_ci.db
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      E2E_API_URL: http://127.0.0.1:8000
      E2E_REMOTE_API_ORIGIN: https://api-dev.1000.school
      E2E_BASE_URL: http://127.0.0.1:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: python -m pip install -r requirements.txt
        working-directory: apps/server

      - name: Migrate and seed DB
        run: PYTHONPATH=. python scripts/migrate_and_seed.py
        working-directory: apps/server

      - name: Build client
        run: npm --workspace apps/client run build

      - name: Install Playwright browser
        run: npm --workspace apps/client exec playwright install --with-deps chromium

      - name: Start server
        run: PYTHONPATH=. python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/server.log 2>&1 &
        working-directory: apps/server

      - name: Start client
        run: npm --workspace apps/client run start -- --hostname 127.0.0.1 --port 3000 > /tmp/client.log 2>&1 &

      - name: Wait for server/client
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/auth/csrf || true)
            if [ "$code" = "200" ]; then
              break
            fi
            sleep 1
          done
          if [ "$code" != "200" ]; then
            echo "Server did not start in time"
            exit 1
          fi

          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000 || true)
            if [ "$code" = "200" ]; then
              break
            fi
            sleep 1
          done
          if [ "$code" != "200" ]; then
            echo "Client did not start in time"
            exit 1
          fi

      - name: Run e2e high tests
        run: npm --workspace apps/client run test:e2e:high

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/client/playwright-report
            apps/client/test-results
            /tmp/server.log
            /tmp/client.log
